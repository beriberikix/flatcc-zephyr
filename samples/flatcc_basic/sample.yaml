sample:
  name: FlatCC basic raw-builder sample

common:
  tags:
    - flatcc
    - samples
  integration_platforms:
    - native_sim

tests:
  flatcc_zephyr.samples.basic:
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "created 16-byte FlatBuffer with Vec3 struct"
        - "PASS"
    platform_allow:
      - native_sim
    timeout: 20
